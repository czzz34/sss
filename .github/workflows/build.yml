name: Build APK

on:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Build APK inside kivy/buildozer container
        # run docker directly so we control entrypoint, stdin, and shell
        run: |
          docker run --rm -i \
            --entrypoint /bin/bash \
            -v "${{ github.workspace }}":/home/user/hostcwd \
            kivy/buildozer:latest \
            -lc "cd /home/user/hostcwd && yes | buildozer android debug --allow-root --verbose"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: apk
          path: bin/*.apk
