name: Build APK

on:
  push:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Build APK
        run: |
          docker run --rm \
          -v ${{ github.workspace }}:/home/user/hostcwd \
          kivy/buildozer \
          bash -c "cd /home/user/hostcwd && yes | buildozer android debug"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: apk
          path: bin/*.apk
