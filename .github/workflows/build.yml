name: Build APK

on:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Build APK using Buildozer Docker image
        # uses a prebuilt container with buildozer + Android SDK
        uses: docker://kivy/buildozer
        with:
          args: bash -lc "yes | buildozer android debug"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: apk
          path: bin/*.apk
